name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # version pinned to the dev dependency in pyproject.toml so a new
      # ruff release cannot change CI results without a code change.
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.21"
          args: check
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.21"
          args: format --check

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        # Core install path (PyQt6 is the optional [gui] extra, so no Qt
        # system libraries are needed; GUI tests skip). The torch extra is
        # installed from the CPU wheel index to avoid the CUDA download.
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install .
      - name: Run tests
        run: pytest warpfactory/tests -q --no-cov
